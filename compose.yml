version: '3.8'

services:
  redis:
    image: redis
    container_name: green_eco_commerce_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass 4caymantruocnha --appendonly yes
    networks:
      - redis_network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/db
    networks:
      - redis_network

volumes:
  redis_data:
  redis_insight_data:

networks:
  redis_network:
    driver: bridge
