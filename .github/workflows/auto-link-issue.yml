name: Auto Link Issue to PR

on:
  pull_request:
    types: [opened]

jobs:
  link-issue:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Issue ID and Update PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            // Get branch name of PR
            const branchName = pr.head.ref;
            // Find Issue from branch name
            const match = branchName.match(/\d+/);

            if (match) {
              const issueId = match[0];
              const closingKeyword = `Closes #${issueId}`;

              // If in PR desription haven't Closes keyword, insert in the end automationally
              if (!pr.body || !pr.body.includes(closingKeyword)) {
                const updatedBody = (pr.body || '') + `\n\n_Automated link:_ ${closingKeyword}`;

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  body: updatedBody
                });
                console.log(`Successfully linked PR to Issue #${issueId}`);
              }
            } else {
              console.log('No issue ID found in branch name.');
            }
